name: Build (experimental cmark-gfm)

# Rama experimental que prueba el motor de render cmark-gfm (de SiggeMcKvack).
# Publica SIEMPRE pre-releases en el canal beta/experimental (appcast-beta.xml).
#
# Crear una pre-release experimental:
#   git tag v0.9-cmark.1 && git push origin v0.9-cmark.1
on:
  push:
    branches: [ experiment/cmark-gfm, feature/consolidate-on-cmark-gfm, experiment/wkwebview ]
    tags: [ 'v*-*' ]          # tags con guion => canal experimental
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-cmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (submódulos prism y cmark-gfm)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generar el parser PEG del editor
        run: make -C Dependency/peg-markdown-highlight

      - name: Preparar Ruby + CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Instalar dependencias (CocoaPods, incluye cmark-gfm local)
        run: |
          gem install cocoapods -v 1.16.2 --no-document
          pod install

      - name: Ejecutar tests (MacDownTests)
        run: |
          xcodebuild test \
            -workspace MacDown.xcworkspace \
            -scheme MacDown \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=11.0 \
            ONLY_ACTIVE_ARCH=YES

      - name: Fijar versión (build siempre; versión corta desde el tag)
        run: |
          PLIST="MacDown/MacDown-Info.plist"
          # Número de build distinguible en TODOS los builds (también artefactos
          # de rama) para poder saber qué versión se está probando.
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "$PLIST"
          # En tags v*, la versión corta sale del tag (p.ej. 1.0-beta.1).
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${GITHUB_REF_NAME#v}" "$PLIST"
          fi

      - name: Compilar MacDown (arm64, sin firma, deployment 11.0)
        run: |
          xcodebuild \
            -workspace MacDown.xcworkspace \
            -scheme MacDown \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=11.0 \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Empaquetar .app (ZIP + DMG)
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/MacDown.app"
          if [ ! -d "$APP" ]; then echo "::error::No se generó $APP"; exit 1; fi
          # Renombrar el bundle para que conviva con la estable (MacDown.app) en /Applications.
          APP_DIST="build/Build/Products/Release/MacDown Remix.app"
          mv "$APP" "$APP_DIST"
          mkdir -p dist
          ditto -c -k --keepParent "$APP_DIST" "dist/MacDown.zip"
          hdiutil create -volname "MacDown Remix" -srcfolder "$APP_DIST" -ov -format UDZO "dist/MacDown.dmg"
          lipo -info "$APP_DIST/Contents/MacOS/MacDown" || true
          ls -la dist

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: MacDown-cmark-gfm
          path: dist/*
          retention-days: 30

      - name: Publicar pre-release (solo en tags con guion)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/MacDown.zip dist/MacDown.dmg \
            --title "MacDown ${GITHUB_REF_NAME} (cmark-gfm experimental)" \
            --prerelease \
            --notes "Pre-release **experimental** con el motor de render **cmark-gfm** (basado en SiggeMcKvack/macdown). Pierde algunas extensiones de hoedown (highlight, superscript, underline, quote). Canal: experimental (beta)."

      - name: Actualizar appcast del canal experimental (en tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "::warning::Sin clave; se omite el appcast."; exit 0
          fi
          TAG="${GITHUB_REF_NAME}"
          SHORTVER="${TAG#v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/MacDown.zip"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          # -f descarta los cambios de "Fijar versión" en el working tree (el
          # appcast se genera desde dist/MacDown.zip, ya construido).
          git checkout -f -B master origin/master
          KEYFILE="$(mktemp)"; printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"
          Tools/update_appcast.sh dist/MacDown.zip "${GITHUB_RUN_NUMBER}" "$SHORTVER" "$URL" "$KEYFILE" "appcast-beta.xml" 11.0
          rm -f "$KEYFILE"
          git add appcast-beta.xml
          git commit -m "ci: appcast-beta (cmark-gfm) para ${TAG} [skip ci]" || { echo "sin cambios"; exit 0; }
          git push origin master
